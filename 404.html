<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    var newDomain = "https://pradigta.com";
    window.location.replace(newDomain + window.location.pathname + window.location.search);
  </script>
</head>
<body>
  Redirecting to <a id="link" href="#">pradigta.com</a>...
  <script>
    document.getElementById("link").href = newDomain + window.location.pathname;
  </script>
</body>
</html>
